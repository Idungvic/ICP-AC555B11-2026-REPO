name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    name: Build, Test and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd Week3/nodejs-cicd-app
          npm install

      - name: Run tests
        run: |
          cd Week3/nodejs-cicd-app
          npm test

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          cd Week3/nodejs-cicd-app
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:latest .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:latest

      - name: Confirm deployment
        run: echo "Image successfully pushed to Docker Hub"